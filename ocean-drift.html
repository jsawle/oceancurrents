<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Message in a Bottle — Drift Simulator</title>
<style>
  :root{
    --abyss:#0a1622;        /* page / deep ocean */
    --ocean:#102a3d;        /* shallow ocean fill */
    --ocean2:#0c2030;       /* ocean gradient bottom */
    --land:#21303a;         /* landmass */
    --land-edge:#3a5060;    /* coastline stroke */
    --ink:#e8f1f5;          /* primary text */
    --ink-dim:#8aa3b0;      /* secondary text */
    --line:#1d3344;         /* hairlines / panel edges */
    --drift:#6ee7ff;        /* active drifters (cyan) */
    --drift-trail:#3aa7c4;  /* trail */
    --arrive:#ffb347;       /* beached / the bottle (amber) */
    --panel:rgba(9,20,31,.82);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--abyss);color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;-webkit-tap-highlight-color:transparent;
  }
  #stage{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%;touch-action:none}

  /* readout — the day counter is the hero number */
  #readout{
    position:fixed;top:16px;left:18px;z-index:5;pointer-events:none;
    text-shadow:0 1px 12px rgba(0,0,0,.55);
  }
  #day{
    font-variant-numeric:tabular-nums;font-weight:800;letter-spacing:-.02em;
    font-size:clamp(34px,7vw,56px);line-height:.9;
  }
  #day small{font-size:.34em;font-weight:600;color:var(--ink-dim);letter-spacing:.18em;
    text-transform:uppercase;display:block;margin-bottom:6px}
  #counts{margin-top:10px;font-size:13px;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  #counts b{color:var(--ink);font-weight:600}
  #counts .arrive{color:var(--arrive)}

  /* title chip */
  #title{
    position:fixed;top:18px;right:18px;z-index:5;text-align:right;pointer-events:none;
    text-shadow:0 1px 12px rgba(0,0,0,.55);
  }
  #title .h{font-weight:700;font-size:15px;letter-spacing:.01em}
  #title .s{font-size:11px;color:var(--ink-dim);letter-spacing:.16em;text-transform:uppercase;margin-top:3px}

  /* hint before first drop */
  #hint{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;
    background:var(--panel);backdrop-filter:blur(6px);border:1px solid var(--line);
    padding:16px 22px;border-radius:14px;font-size:15px;color:var(--ink);
    box-shadow:0 18px 50px rgba(0,0,0,.5);text-align:center;max-width:80vw;
    transition:opacity .4s;
  }
  #hint .b{display:inline-block;width:11px;height:11px;border-radius:50%;
    background:var(--arrive);box-shadow:0 0 0 4px rgba(255,179,71,.22);margin-right:8px;
    vertical-align:middle}

  /* control dock */
  #dock{
    position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:5;
    background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:16px;
    padding:11px 12px;display:flex;gap:14px;align-items:center;
    box-shadow:0 14px 40px rgba(0,0,0,.45);max-width:calc(100vw - 24px);
    flex-wrap:wrap;justify-content:center;
  }
  .btn{
    appearance:none;border:1px solid var(--line);background:#13283a;color:var(--ink);
    font:inherit;font-size:14px;font-weight:600;border-radius:10px;padding:9px 14px;
    cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;
  }
  .btn:hover{background:#19344a;border-color:#27465c}
  .btn:focus-visible{outline:2px solid var(--drift);outline-offset:2px}
  .btn.primary{background:var(--arrive);border-color:var(--arrive);color:#2a1a05}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn svg{width:15px;height:15px;display:block}

  .ctrl{display:flex;flex-direction:column;gap:3px;min-width:104px}
  .ctrl label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);
    display:flex;justify-content:space-between;gap:8px}
  .ctrl label b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:3px;
    background:#23435a;outline:none;margin:6px 0 2px;
  }
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--drift);cursor:pointer;border:2px solid #0a1622}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;
    background:var(--drift);cursor:pointer;border:2px solid #0a1622}
  input[type=range]:focus-visible{outline:2px solid var(--drift);outline-offset:4px}

  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-dim);cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--drift);width:15px;height:15px}

  .sep{width:1px;align-self:stretch;background:var(--line)}

  /* zoom controls */
  #zoomctl{
    position:fixed;right:18px;bottom:84px;z-index:5;display:flex;flex-direction:column;gap:6px;
  }
  #zoomctl button{
    width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);backdrop-filter:blur(8px);color:var(--ink);
    font-size:19px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,.4);transition:.15s;line-height:1;
  }
  #zoomctl button:hover{background:#19344a;border-color:#27465c}
  #zoomctl button:focus-visible{outline:2px solid var(--drift);outline-offset:2px}
  #zoomctl button svg{width:17px;height:17px}
  @media (max-width:720px){ #zoomctl{bottom:96px;right:12px} }

  /* provenance */
  #prov{
    position:fixed;left:18px;bottom:14px;z-index:4;font-size:10.5px;color:var(--ink-dim);
    max-width:min(46vw,340px);line-height:1.45;pointer-events:none;
    text-shadow:0 1px 8px rgba(0,0,0,.6);
  }
  @media (max-width:720px){
    #prov{display:none}
    #title{display:none}
    .ctrl{min-width:84px}
    .sep{display:none}
  }
  @media (prefers-reduced-motion: reduce){
    #hint{transition:none}
  }
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas></div>

<div id="readout">
  <div id="day"><small>Drift time</small>Day 0</div>
  <div id="counts"><b id="nActive">0</b> adrift · <span class="arrive"><b id="nBeached">0</b> ashore</span></div>
</div>

<div id="title">
  <div class="h">Message in a Bottle</div>
  <div class="s">Surface-drift simulator</div>
</div>

<div id="hint"><span class="b"></span>Tap the ocean to drop your bottle &middot; scroll or pinch to zoom &middot; drag to pan</div>

<div id="dock">
  <button class="btn primary" id="play" aria-label="Play or pause">
    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <span id="playLabel">Play</span>
  </button>
  <button class="btn" id="reset" aria-label="Reset">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    Reset
  </button>
  <div class="sep"></div>
  <div class="ctrl">
    <label>Bottles <b id="vParticles">120</b></label>
    <input type="range" id="particles" min="20" max="400" step="10" value="120">
  </div>
  <div class="ctrl">
    <label>Speed <b id="vSpeed">8×</b></label>
    <input type="range" id="speed" min="1" max="20" step="1" value="8">
  </div>
  <div class="ctrl">
    <label>Eddy spread <b id="vEddy">med</b></label>
    <input type="range" id="eddy" min="0" max="8000" step="250" value="1500">
  </div>
  <div class="sep"></div>
  <label class="toggle"><input type="checkbox" id="showCur" checked> Currents</label>
</div>

<div id="zoomctl">
  <button id="zin" aria-label="Zoom in" title="Zoom in">+</button>
  <button id="zout" aria-label="Zoom out" title="Zoom out">&minus;</button>
  <button id="zworld" aria-label="Whole world" title="Whole world">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/></svg>
  </button>
</div>

<div id="prov"></div>

  function gauss(){ // Box-Muller
    var u=0,v=0; while(u===0)u=Math.random(); while(v===0)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
  }
  function wrapLon(l){ l=((l+180)%360+360)%360-180; return l; }

  function release(lon, lat){
    particles=[]; elapsed=0;
    var spreadKm = 35;                                  // initial blob radius
    for (var i=0;i<P.n;i++){
      // scatter in a small disc so nearby bottles can diverge through the flow
      var r=spreadKm*Math.sqrt(Math.random()), th=Math.random()*2*Math.PI;
      var dlat=(r*Math.sin(th))/(DEG_M/1000);
      var dlon=(r*Math.cos(th))/((DEG_M/1000)*Math.max(0.15,Math.cos(lat*Math.PI/180)));
      var plon=wrapLon(lon+dlon), plat=lat+dlat;
      particles.push({ lon:plon, lat:plat, alive:isOcean(plon,plat), trail:[] });
    }
    dropped=true;
    document.getElementById('hint').style.opacity='0';
    setTimeout(function(){var h=document.getElementById('hint'); if(h)h.style.display='none';},420);
  }

  function deriv(lon,lat){
    var s=sample(lon,lat); if(!s) return null;
    var coslat=Math.max(0.15,Math.cos(lat*Math.PI/180));
    return [ s[0]/(DEG_M*coslat), s[1]/DEG_M ];        // [dlon/s, dlat/s]
  }

  function stepParticle(p, dt, sigmaM){
    if(!p.alive) return;
    var k1=deriv(p.lon,p.lat); if(!k1){p.alive=false;return;}
    var k2=deriv(p.lon+0.5*dt*k1[0], p.lat+0.5*dt*k1[1]); if(!k2){p.alive=false;return;}
    var k3=deriv(p.lon+0.5*dt*k2[0], p.lat+0.5*dt*k2[1]); if(!k3){p.alive=false;return;}
    var k4=deriv(p.lon+dt*k3[0], p.lat+dt*k3[1]); if(!k4){p.alive=false;return;}
    var nlon=p.lon + dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    var nlat=p.lat + dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    // stochastic eddy diffusion (random walk)
    if(sigmaM>0){
      var coslat=Math.max(0.15,Math.cos(nlat*Math.PI/180));
      nlat += (sigmaM*gauss())/DEG_M;
      nlon += (sigmaM*gauss())/(DEG_M*coslat);
    }
    nlon=wrapLon(nlon);
    if(nlat>85||nlat<-85){p.alive=false;return;}
    if(!isOcean(nlon,nlat)){ p.alive=false; return; }   // beached
    p.lon=nlon; p.lat=nlat;
  }

  function advance(simSeconds, substeps){
    var dt=simSeconds/substeps;
    var sigmaM=Math.sqrt(2*P.eddy*dt);                  // per-substep diffusion scale
    for(var s=0;s<substeps;s++){
      for(var i=0;i<particles.length;i++) stepParticle(particles[i], dt, sigmaM);
    }
    elapsed+=simSeconds;
    // record trail once per advance
    for(var j=0;j<particles.length;j++){
      var p=particles[j];
      p.trail.push([p.lon,p.lat]);
      if(p.trail.length>160) p.trail.shift();
    }
  }

  // ---------- drawing ----------
  function drawCoast(){
    // ocean background gradient
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0e2638'); g.addColorStop(1,'#0a1c2a');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // land
    ctx.beginPath();
    for(var r=0;r<COAST.length;r++){
      var ring=COAST[r];
      for(var i=0;i<ring.length;i+=2){
        var x=lon2x(ring[i]), y=lat2y(ring[i+1]);
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.closePath();
    }
    ctx.fillStyle=getCss('--land'); ctx.fill('evenodd');
    ctx.lineWidth=1; ctx.strokeStyle=getCss('--land-edge'); ctx.stroke();
  }

  function drawCurrents(){
    if(!P.showCur) return;
    var px=42;                              // on-screen spacing between streaks
    var streak=px*0.62;                     // streak length scale (px per m/s-ish)
    ctx.lineWidth=1; ctx.lineCap='round';
    for(var sy=px*0.5; sy<H; sy+=px){
      for(var sx=px*0.5; sx<W; sx+=px){
        var lon=x2lon(sx), lat=y2lat(sy);
        if(lon<-180||lon>180||lat>89||lat<-89) continue;
        var s=sample(lon,lat); if(!s) continue;
        var sp=Math.hypot(s[0],s[1]); if(sp<0.04) continue;
        var ang=Math.atan2(-s[1], s[0]);    // screen y is down, so negate v
        var L=Math.min(px*0.9, 6+sp*streak);
        var ex=sx+Math.cos(ang)*L, ey=sy+Math.sin(ang)*L;
        var a=Math.min(.55, .12+sp*0.6);
        ctx.strokeStyle='rgba(120,200,235,'+a.toFixed(3)+')';
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
      }
    }
  }

  function drawParticles(){
    // trails
    ctx.lineWidth=1.2; ctx.strokeStyle='rgba(58,167,196,.5)';
    for(var i=0;i<particles.length;i++){
      var t=particles[i].trail; if(t.length<2) continue;
      ctx.beginPath();
      var px=lon2x(t[0][0]); var prevLon=t[0][0];
      ctx.moveTo(px, lat2y(t[0][1]));
      for(var k=1;k<t.length;k++){
        if(Math.abs(t[k][0]-prevLon)>180){ // seam break
          ctx.moveTo(lon2x(t[k][0]), lat2y(t[k][1]));
        } else {
          ctx.lineTo(lon2x(t[k][0]), lat2y(t[k][1]));
        }
        prevLon=t[k][0];
      }
      ctx.stroke();
    }
    // heads
    for(var j=0;j<particles.length;j++){
      var p=particles[j], x=lon2x(p.lon), y=lat2y(p.lat);
      if(p.alive){
        ctx.fillStyle=getCss('--drift');
        ctx.beginPath(); ctx.arc(x,y,1.9,0,6.283); ctx.fill();
      } else {
        ctx.fillStyle=getCss('--arrive');
        ctx.beginPath(); ctx.arc(x,y,2.4,0,6.283); ctx.fill();
      }
    }
  }

  var cssCache={};
  function getCss(v){ if(!(v in cssCache)) cssCache[v]=getComputedStyle(document.documentElement).getPropertyValue(v).trim(); return cssCache[v]; }

  function render(){
    drawCoast();
    drawCurrents();
    if(dropped) drawParticles();
  }

  // ---------- counts ----------
  function updateCounts(){
    var a=0,b=0;
    for(var i=0;i<particles.length;i++){ if(particles[i].alive)a++; else b++; }
    document.getElementById('nActive').textContent=a;
    document.getElementById('nBeached').textContent=b;
    document.getElementById('day').childNodes[1].nodeValue='Day '+Math.floor(elapsed/86400);
    return a;
  }

  // ---------- loop ----------
  var last=0;
  function frame(ts){
    if(!last) last=ts; var realDt=Math.min(0.05,(ts-last)/1000); last=ts;
    if(playing && dropped){
      // frame-rate independent: advance (speed * 0.25) sim-days per real second
      var simSec = (P.speed*0.25)*86400*realDt;
      var sub = Math.max(2, Math.min(12, Math.round(P.speed/2)+2));
      advance(simSec, sub);
      var active=updateCounts();
      if(active===0 || elapsed>365*86400){ setPlaying(false); }
    }
    render();
    requestAnimationFrame(frame);
  }

  // ---------- controls ----------
  function setPlaying(on){
    playing=on;
    document.getElementById('playLabel').textContent=on?'Pause':'Play';
    document.getElementById('playIcon').innerHTML = on
      ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }
  document.getElementById('play').addEventListener('click',function(){
    if(!dropped){ return; } setPlaying(!playing);
  });
  document.getElementById('reset').addEventListener('click',function(){
    particles=[]; elapsed=0; dropped=false; setPlaying(false);
    updateCounts();
    var h=document.getElementById('hint'); h.style.display=''; h.style.opacity='1';
  });

  function bindSlider(id, key, fmt){
    var el=document.getElementById(id), out=document.getElementById('v'+id.charAt(0).toUpperCase()+id.slice(1));
    function upd(){ P[key]=+el.value; if(out) out.textContent=fmt(+el.value); }
    el.addEventListener('input',upd); upd();
  }
  bindSlider('particles','n',function(v){return v});
  bindSlider('speed','speed',function(v){return v+'\u00D7'});
  bindSlider('eddy','eddy',function(v){return v===0?'off':v<1500?'low':v<4000?'med':'high'});
  document.getElementById('showCur').addEventListener('change',function(e){P.showCur=e.target.checked;});

  // ---------- optional month selector (auto-enabled when a monthly climatology is baked in) ----------
  if (MONTHLY && MONTHLY.length===12){
    var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var dock=document.getElementById('dock');
    var sepEl=document.createElement('div'); sepEl.className='sep'; dock.appendChild(sepEl);
    var wrapDiv=document.createElement('div'); wrapDiv.className='ctrl'; wrapDiv.style.minWidth='118px';
    wrapDiv.innerHTML='<label>Release month</label>';
    var sel=document.createElement('select'); sel.className='btn';
    sel.style.padding='9px 10px'; sel.style.width='100%';
    for(var m=0;m<12;m++){var o=document.createElement('option');o.value=m;o.textContent=MN[m];sel.appendChild(o);}
    wrapDiv.appendChild(sel); dock.appendChild(wrapDiv);
    FIELD=decode(MONTHLY[0]);                       // start on January
    sel.addEventListener('change',function(){ FIELD=decode(MONTHLY[+sel.value]); });
  }

  // re-release with new particle count if user changes it after dropping
  document.getElementById('particles').addEventListener('change',function(){
    if(dropped && particles.length){
      // recentre on the mean of current live particles' origin = first trail point average
      // simplest: re-drop at the original release centre stored on first particle's trail[0]
      var c=lastDrop; if(c){ release(c[0],c[1]); }
    }
  });

  // ---------- pointer: drag to pan, wheel/pinch to zoom, tap to drop ----------
  var lastDrop=null;
  var pointers={}, panPx=null, pinchDist=null, pinchMid=null, downXY=null, moved=false;
  function rel(ev){ var r=cv.getBoundingClientRect(); return [ev.clientX-r.left, ev.clientY-r.top]; }

  function dropAt(sx,sy){
    var lon=x2lon(sx), lat=y2lat(sy);
    if(isOcean(lon,lat)){ lastDrop=[lon,lat]; release(lon,lat); setPlaying(true); return; }
    flashHint("No drift data at that spot \u2014 try open ocean. This field covers the open oceans, not enclosed seas like the Mediterranean or Black Sea.");
  }

  cv.addEventListener('pointerdown',function(ev){
    cv.setPointerCapture(ev.pointerId);
    pointers[ev.pointerId]=rel(ev);
    var ids=Object.keys(pointers);
    if(ids.length===1){ panPx=pointers[ev.pointerId]; downXY=panPx.slice(); moved=false; cv.style.cursor='grabbing'; }
    else if(ids.length===2){ var a=pointers[ids[0]],b=pointers[ids[1]];
      pinchDist=Math.hypot(a[0]-b[0],a[1]-b[1]); pinchMid=[(a[0]+b[0])/2,(a[1]+b[1])/2]; }
  });
  cv.addEventListener('pointermove',function(ev){
    if(!(ev.pointerId in pointers)) return;
    pointers[ev.pointerId]=rel(ev);
    var ids=Object.keys(pointers);
    if(ids.length>=2){
      var a=pointers[ids[0]],b=pointers[ids[1]];
      var d=Math.hypot(a[0]-b[0],a[1]-b[1]), mid=[(a[0]+b[0])/2,(a[1]+b[1])/2];
      if(pinchDist){ zoomAt(mid[0],mid[1], d/pinchDist); }
      if(pinchMid){ view.oX-=(mid[0]-pinchMid[0])/(view.Z*W); view.oY-=(mid[1]-pinchMid[1])/(view.Z*H); clampView(); }
      pinchDist=d; pinchMid=mid; moved=true;
    } else if(panPx){
      var p=pointers[ev.pointerId];
      view.oX-=(p[0]-panPx[0])/(view.Z*W);
      view.oY-=(p[1]-panPx[1])/(view.Z*H);
      clampView(); panPx=p;
      if(downXY && Math.hypot(p[0]-downXY[0],p[1]-downXY[1])>6) moved=true;
    }
  });
  function endPointer(ev){
    var was1=Object.keys(pointers).length===1;
    delete pointers[ev.pointerId];
    if(Object.keys(pointers).length<2){ pinchDist=null; pinchMid=null; }
    if(Object.keys(pointers).length===0){
      cv.style.cursor='grab';
      if(was1 && !moved && downXY){ dropAt(downXY[0],downXY[1]); }
      panPx=null; downXY=null;
    }
  }
  cv.addEventListener('pointerup',endPointer);
  cv.addEventListener('pointercancel',endPointer);
  cv.addEventListener('wheel',function(ev){
    ev.preventDefault();
    var xy=rel(ev);
    zoomAt(xy[0],xy[1], Math.exp(-ev.deltaY*0.0015));
  },{passive:false});
  cv.style.cursor='grab';

  // zoom buttons
  document.getElementById('zin').addEventListener('click',function(){ zoomAt(W/2,H/2,1.5); });
  document.getElementById('zout').addEventListener('click',function(){ zoomAt(W/2,H/2,1/1.5); });
  document.getElementById('zworld').addEventListener('click',function(){ resetView(); });

  var hintTimer=null;
  function flashHint(msg){
    var h=document.getElementById('hint');
    h.style.display=''; h.style.opacity='1';
    h.innerHTML='<span class="b"></span>'+msg;
    clearTimeout(hintTimer);
    hintTimer=setTimeout(function(){ if(!dropped){h.innerHTML='<span class="b"></span>Tap the ocean to drop your bottle &middot; scroll or pinch to zoom &middot; drag to pan';} else {h.style.opacity='0';setTimeout(function(){h.style.display='none';},420);} },2200);
  }

  // ---------- boot ----------
  resize();
  updateCounts();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
